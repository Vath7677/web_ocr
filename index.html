<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>OCR Recognizer</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Noto+Sans+Khmer:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css">
  </head>

  <body>

    <div class="bar"></div>


    <main class="app-shell">
      <section class="scanner" aria-labelledby="page-title">
        <div class="scanner__intro">
          <h1 id="page-title">OCR Recognizer</h1>
          <p class="intro-copy">
            Upload a document image, receipt, note, or screenshot and extract clean editable text in seconds.
          </p>
        </div>

        <div class="workspace">
          <section class="upload-panel" aria-label="Image upload">
            <div class="toolbar">
              <label class="field">
                <span>Recognition language</span>
                <select id="languageSelect">
                  <option value="eng">English only</option>
                </select>
              </label>

              <button class="ghost-button" id="clearButton" type="button" disabled>
                Clear
              </button>
            </div>

            <label
              class="drop-zone"
              id="dropZone"
              for="imageInput"
              aria-describedby="uploadHelp uploadStatus"
              aria-controls="previewCard resultPanel"
            >
              <input id="imageInput" type="file" accept="image/*" />
              <span class="upload-icon" aria-hidden="true">
                <svg viewBox="0 0 24 24" role="img">
                  <path d="M12 3v11m0-11 4 4m-4-4-4 4" />
                  <path d="M5 14v4a3 3 0 0 0 3 3h8a3 3 0 0 0 3-3v-4" />
                </svg>
              </span>
              <strong>Drop an image here</strong>
              <span id="uploadHelp">or click to browse your file</span>
            </label>

            <div class="relation-status" id="uploadStatus">
              No image selected yet.
            </div>

            <div class="preview-card" id="previewCard" hidden aria-live="polite">
              <img id="previewImage" alt="Selected image preview" />
              <div>
                <p id="fileName">No file selected</p>
                <span id="fileMeta"></span>
              </div>
            </div>

            <button class="primary-button" id="scanButton" type="button" disabled aria-controls="outputText progressWrap">
              <span>Scan Text</span>
            </button>

            <div class="progress" id="progressWrap" hidden>
              <div class="progress__track">
                <span id="progressBar"></span>
              </div>
              <p id="statusText">Preparing OCR engine...</p>
            </div>
          </section>

          <section class="result-panel" id="resultPanel" aria-label="Extracted text">
            <div class="result-header">
              <div>
                <p class="eyebrow">Result</p>
                <h2>Extracted Text</h2>
              </div>

              <div class="result-actions">
                <button class="icon-button" id="copyButton" type="button" disabled title="Copy text" aria-label="Copy text">
                  <svg viewBox="0 0 24 24" aria-hidden="true">
                    <rect x="9" y="9" width="11" height="11" rx="2" />
                    <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1" />
                  </svg>
                </button>

                <button class="icon-button" id="downloadButton" type="button" disabled title="Download text" aria-label="Download text">
                  <svg viewBox="0 0 24 24" aria-hidden="true">
                    <path d="M12 3v12m0 0 4-4m-4 4-4-4" />
                    <path d="M5 21h14" />
                  </svg>
                </button>
              </div>
            </div>

            <textarea
              id="outputText"
              placeholder="Your recognized text will appear here..."
              spellcheck="false"
              aria-describedby="wordCount charCount"
            ></textarea>

            <div class="text-stats">
              <span id="wordCount">0 words</span>
              <span id="charCount">0 characters</span>
            </div>
          </section>
        </div>
      </section>
    </main>

    <div class="toast" id="toast" role="status" aria-live="polite"></div>

    <noscript>
      <p class="noscript-message">Please enable JavaScript to scan images and extract text.</p>
    </noscript>

    <script defer src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    <script src="script.js"></script>
  </body>
</html>
